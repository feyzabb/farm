<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Mahsul Yönetimi - AgriTech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; }
    .navbar { background: linear-gradient(135deg, #059669 0%, #10b981 100%); padding: 1rem 0; }
    .card { border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .card-header { background-color: transparent; border-bottom: 1px solid #f0f0f0; padding: 1.5rem; }
    .table { border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); background: white; }
    .table thead th { background-color: #1e293b; color: white; border: none; padding: 1rem; }
    .btn-success { background: linear-gradient(135deg, #059669 0%, #10b981 100%); border: none; }
    .btn-success:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-5 shadow-sm">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold fs-4" href="/greenhouses">
      <i class="bi bi-tree me-2"></i>AgriTech Farm
    </a>
    <div>
      <a href="/greenhouses" class="btn btn-outline-light btn-sm rounded-pill px-4 me-2">Seralar</a>
      <a href="/crops" class="btn btn-light btn-sm rounded-pill px-4 fw-bold text-success shadow-sm">Mahsuller</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-header pt-4">
          <h5 class="fw-bold text-dark m-0"><i class="bi bi-flower1 text-success me-2"></i>Yeni Mahsul Ekimi</h5>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/crops/save}" th:object="${newCrop}" method="post">
            <div class="mb-3">
              <label class="form-label text-muted small fw-bold">Mahsul Türü</label>
              <input type="text" th:field="*{name}" class="form-control" placeholder="Örn: Sırık Domates" required />
            </div>
            <div class="mb-3">
              <label class="form-label text-muted small fw-bold">Ekim Tarihi</label>
              <input type="date" th:field="*{plantDate}" class="form-control" required />
            </div>
            <div class="mb-4">
              <label class="form-label text-muted small fw-bold">Hangi Seraya Ekilecek?</label>
              <select th:field="*{greenhouse}" class="form-select" required>
                <option value="" disabled selected>Sera Seçiniz</option>
                <option th:each="gh : ${greenhouses}" th:value="${gh.id}" th:text="${gh.name}"></option>
              </select>
            </div>
            <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold">Ekim Yap</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <h4 class="fw-bold mb-3 text-dark">Mahsul Durum Listesi</h4>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
          <tr>
            <th>Mahsul Adı</th>
            <th>Bulunduğu Sera</th>
            <th>Ekim Tarihi</th>
            <th>İşlem</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="crop : ${crops}">
            <td class="fw-bold text-dark"><i class="bi bi-droplet-fill text-info me-2"></i><span th:text="${crop.name}"></span></td>
            <td><span class="badge bg-secondary rounded-pill" th:text="${crop.greenhouse.name}"></span></td>
            <td class="text-muted" th:text="${crop.plantDate}"></td>
            <td>
              <a th:href="@{/crops/delete/{id}(id=${crop.id})}" class="btn btn-danger btn-sm text-white shadow-sm">
                <i class="bi bi-trash3"></i> Hasat Et / Sil
              </a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(crops)}">
            <td colspan="4" class="text-center py-4 text-muted">Seralarda henüz ekili mahsul yok.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
