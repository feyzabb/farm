<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ol - AgriTech Farm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 2rem; }
    .btn-success { background: linear-gradient(135deg, #059669 0%, #10b981 100%); border: none; }
  </style>
</head>
<body>
<div class="card text-center">
  <h3 class="fw-bold text-success mb-4">Yeni Hesap Oluştur</h3>

  <form th:action="@{/signup}" th:object="${user}" method="post">
    <div class="mb-3 text-start">
      <label class="form-label fw-bold small text-muted">Kullanıcı Adı Belirleyin</label>
      <input type="text" th:field="*{username}" class="form-control" required />
    </div>
    <div class="mb-4 text-start">
      <label class="form-label fw-bold small text-muted">Şifre Belirleyin</label>
      <input type="password" th:field="*{password}" class="form-control" required />
    </div>
    <button type="submit" class="btn btn-success w-100 rounded-pill fw-bold py-2">Kayıt Ol</button>
  </form>
  <div class="mt-4 small">
    Zaten hesabınız var mı? <a href="/" class="text-success fw-bold text-decoration-none">Giriş Yap</a>
  </div>
</div>
</body>
</html>
